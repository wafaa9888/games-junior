    <script>
        // Synthesize cute game sounds using pure browser Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            try {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'jump') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(140, now);
                    osc.frequency.exponentialRampToValueAtTime(550, now + 0.3);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'fail') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.linearRampToValueAtTime(90, now + 0.35);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.35);
                    osc.start(now);
                    osc.stop(now + 0.35);
                } else if (type === 'success') {
                    // Quick happy arpeggio
                    const notes = [261.63, 329.63, 392.00, 523.25];
                    notes.forEach((freq, idx) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.type = 'sine';
                        o.frequency.setValueAtTime(freq, now + idx * 0.08);
                        g.gain.setValueAtTime(0.12, now + idx * 0.08);
                        g.gain.linearRampToValueAtTime(0.01, now + idx * 0.08 + 0.25);
                        o.start(now + idx * 0.08);
                        o.stop(now + idx * 0.08 + 0.25);
                    });
                } else if (type === 'giggle') {
                    // Quick cartoonish giggle sounds for children
                    const giggles = [350, 450, 350, 450, 550];
                    giggles.forEach((freq, idx) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.type = 'triangle';
                        o.frequency.setValueAtTime(freq, now + idx * 0.12);
                        g.gain.setValueAtTime(0.15, now + idx * 0.12);
                        g.gain.linearRampToValueAtTime(0.01, now + idx * 0.12 + 0.1);
                        o.start(now + idx * 0.12);
                        o.stop(now + idx * 0.12 + 0.1);
                    });
                }
            } catch (err) {
                console.log('Audio disabled/not supported');
            }
        }

        /* Coordinates Grid Setup (LTR layout):
           Rows: 1 (top) to 5 (bottom)
           Cols: 1 (left) to 5 (right)
           
           Stage mapping matches image:
           Stage 1: (5,1) -> (5,5) : Moves physically RIGHT. Arrow: 'right', 4 Steps.
           Stage 2: (5,5) -> (1,5) : Moves physically UP. Arrow: 'up', 4 Steps.
           Stage 3: (1,5) -> (1,2) : Moves physically LEFT. Arrow: 'left', 3 Steps. (Carrot is at 1,2)
        */
        const STAGES = {
            1: {
                correctDirection: 'right',
                start: { r: 5, c: 1 },
                end: { r: 5, c: 5 },
                steps: 4,
                path: [{r:5,c:1}, {r:5,c:2}, {r:5,c:3}, {r:5,c:4}, {r:5,c:5}],
                prompt: "ساعد الأرنب للوصول إلى العلم الأحمر 🚩"
            },
            2: {
                correctDirection: 'up',
                start: { r: 5, c: 5 },
                end: { r: 1, c: 5 },
                steps: 4,
                path: [{r:5,c:5}, {r:4,c:5}, {r:3,c:5}, {r:2,c:5}, {r:1,c:5}],
                prompt: "ساعد الأرنب للصعود إلى العلم الأخضر 🚩"
            },
            3: {
                correctDirection: 'left',
                start: { r: 1, c: 5 },
                end: { r: 1, c: 2 },
                steps: 3,
                path: [{r:1,c:5}, {r:1,c:4}, {r:1,c:3}, {r:1,c:2}],
                prompt: "ساعد الأرنب للحصول على الجزرة اللذيذة 🥕"
            }
        };

        let currentStage = 1;
        let rabbitPos = { r: 5, c: 1 };
        let isAnimating = false;
        let rabbitFacingRight = true; // Initial direction is RIGHT
        let showSuccessBubble = false; // Toggle encouraging speech bubble near rabbit

        // Premium vector SVG of rabbit
        const getRabbitSVG = () => {
            const scaleX = rabbitFacingRight ? -1 : 1;
            return `
                <div class="w-full h-full flex items-center justify-center transition-transform duration-300" style="transform: scaleX(${scaleX});">
                    <div class="animate-jump">
                        <svg viewBox="0 0 100 100" class="w-12 h-12">
                            <!-- Ears -->
                            <ellipse cx="42" cy="22" rx="6" ry="16" fill="#FFFFFF" stroke="#475569" stroke-width="3" transform="rotate(-10 42 22)"/>
                            <ellipse cx="42" cy="22" rx="3" ry="11" fill="#FFC0CB"/>
                            <ellipse cx="32" cy="24" rx="6" ry="16" fill="#FFFFFF" stroke="#475569" stroke-width="3" transform="rotate(-20 32 24)"/>
                            <ellipse cx="32" cy="24" rx="3" ry="11" fill="#FFC0CB"/>
                            <!-- Tail -->
                            <circle cx="78" cy="65" r="9" fill="#E2E8F0" stroke="#475569" stroke-width="3"/>
                            <!-- Body -->
                            <ellipse cx="54" cy="65" rx="26" ry="20" fill="#FFFFFF" stroke="#475569" stroke-width="3"/>
                            <!-- Head -->
                            <circle cx="34" cy="46" r="17" fill="#FFFFFF" stroke="#475569" stroke-width="3"/>
                            <!-- Eye -->
                            <circle cx="28" cy="42" r="3.5" fill="#1e293b"/>
                            <circle cx="26.5" cy="40.5" r="1.2" fill="#FFFFFF"/>
                            <!-- Cheeks & Nose -->
                            <circle cx="32" cy="49" r="3" fill="#FFC0CB"/>
                            <polygon points="20,46 17,44 20,42" fill="#FFA07A"/>
                            <!-- Feet -->
                            <ellipse cx="44" cy="83" rx="9" ry="5" fill="#FFFFFF" stroke="#475569" stroke-width="3"/>
                            <ellipse cx="64" cy="83" rx="9" ry="5" fill="#FFFFFF" stroke="#475569" stroke-width="3"/>
                        </svg>
                    </div>
                </div>
            `;
        };

        const getCarrotSVG = () => `
            <div class="w-full h-full flex items-center justify-center scale-110">
                <svg viewBox="0 0 100 100" class="w-12 h-12">
                    <!-- Leaves -->
                    <path d="M50,40 C45,20 40,10 50,5 C60,10 55,20 50,40 Z" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
                    <path d="M50,40 C35,25 25,15 35,8 C45,15 45,25 50,40 Z" fill="#4ade80" stroke="#15803d" stroke-width="2"/>
                    <path d="M50,40 C65,25 75,15 65,8 C55,15 55,25 50,40 Z" fill="#4ade80" stroke="#15803d" stroke-width="2"/>
                    <!-- Carrot Body -->
                    <path d="M50,35 C58,35 60,45 58,55 C55,75 50,95 50,95 C50,95 45,75 42,55 C40,45 42,35 50,35 Z" fill="#f97316" stroke="#c2410c" stroke-width="3.5"/>
                    <path d="M44,48 L56,48 M45,58 L55,58 M47,68 L53,68" stroke="#7c2d12" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
        `;

        const getFlagSVG = (color, num) => `
            <div class="relative w-full h-full flex items-center justify-center animate-wave">
                <svg viewBox="0 0 100 100" class="w-10 h-10">
                    <rect x="36" y="15" width="5" height="75" fill="#64748b" rx="2.5"/>
                    <path d="M41,20 L82,30 L41,40 Z" fill="${color}" stroke="#e2e8f0" stroke-width="1.5"/>
                    <circle cx="38.5" cy="15" r="4.5" fill="#e2e8f0"/>
                    <text x="50" y="33" font-size="12" font-weight="bold" fill="#1e293b" font-family="sans-serif">${num}</text>
                </svg>
            </div>
        `;

        // Check if a cell coordinate belongs to the valid paths of any stages
        function isValidPathCell(r, c) {
            if (r === 5) return true;
            if (c === 5) return true;
            if (r === 1 && c >= 2) return true;
            return false;
        }

        // Main function to dynamically render/update grid elements
        function renderGrid() {
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';

            for (let r = 1; r <= 5; r++) {
                for (let c = 1; c <= 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = "relative flex items-center justify-center rounded-xl transition-all duration-300";
                    
                    if (isValidPathCell(r, c)) {
                        cell.classList.add('bg-white', 'border-2', 'border-slate-100', 'shadow-sm');
                    } else {
                        cell.classList.add('bg-slate-700', 'border', 'border-slate-800');
                    }

                    // Populate entities based on position and active state
                    if (rabbitPos.r === r && rabbitPos.c === c) {
                        cell.innerHTML = getRabbitSVG();
                        
                        // Append success bubble overlay when Stage completes
                        if (showSuccessBubble) {
                            // Smart layout positioning: if rabbit is on the top row (r=1), bubble points up from below.
                            // Otherwise, bubble points down from above (bottom-14).
                            const isTopRow = (r === 1);
                            const bubblePositionClass = isTopRow 
                                ? "absolute top-14 left-1/2 -translate-x-1/2 bg-yellow-300 border-4 border-yellow-500 rounded-2xl px-4 py-2 shadow-2xl z-50 animate-bounce flex items-center gap-2 w-max"
                                : "absolute bottom-14 left-1/2 -translate-x-1/2 bg-yellow-300 border-4 border-yellow-500 rounded-2xl px-4 py-2 shadow-2xl z-50 animate-bounce flex items-center gap-2 w-max";
                            
                            const arrowPositionClass = isTopRow
                                ? "absolute top-[-11px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-b-[10px] border-b-yellow-500"
                                : "absolute bottom-[-11px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-t-[10px] border-t-yellow-500";

                            cell.innerHTML += `
                                <div class="${bubblePositionClass}">
                                    <span class="text-3xl">😄</span>
                                    <span class="text-yellow-950 font-black text-base sm:text-lg whitespace-nowrap">هيا نكمل طريقنا!</span>
                                    <!-- Bubble Arrow -->
                                    <div class="${arrowPositionClass}"></div>
                                </div>
                            `;
                        }
                    } else if (r === 1 && c === 2) {
                        cell.innerHTML = getCarrotSVG();
                    } else if (r === 5 && c === 5 && currentStage <= 1) {
                        cell.innerHTML = getFlagSVG('#ef4444', 1); // Red Flag (highly visible)
                    } else if (r === 1 && c === 5 && currentStage <= 2) {
                        cell.innerHTML = getFlagSVG('#22c55e', 2); // Green Flag (highly visible)
                    }

                    gridContainer.appendChild(cell);
                }
            }
        }

        // Displays loop blocks progressively, one stage at a time
        function syncBlockProgressUI() {
            for (let b = 1; b <= 3; b++) {
                const container = document.getElementById(`block-container-${b}`);
                const slot = document.getElementById(`slot-${b}`);
                
                if (b <= currentStage) {
                    // Activate block & animate transition
                    container.className = "transition-all duration-500 w-full max-w-[220px] opacity-100 scale-100 mt-2 block";
                    
                    if (b === currentStage) {
                        // Current stage slot has a pulsing question mark
                        slot.innerText = '؟';
                        slot.className = "w-full h-full bg-pink-100 border-4 border-dashed border-pink-400 rounded-xl flex items-center justify-center text-3xl font-black text-pink-600 shadow-inner pulse-question";
                        container.classList.add('active-pulse');
                    } else {
                        // Previous solved blocks lock their arrows
                        let arrowText = '➡️';
                        if (b === 2) arrowText = '⬆️';
                        if (b === 3) arrowText = '⬅️';
                        
                        slot.innerText = arrowText;
                        slot.className = "w-full h-full bg-green-50 border-4 border-solid border-green-500 rounded-xl flex items-center justify-center text-3xl font-black text-green-600 shadow-md";
                        container.classList.remove('active-pulse');
                    }
                } else {
                    // Lock/Hide future blocks completely
                    container.className = "transition-all duration-500 w-0 h-0 opacity-0 overflow-hidden pointer-events-none hidden";
                    slot.innerText = '؟';
                    slot.className = "w-full h-full bg-pink-50 border-4 border-dashed border-pink-400 rounded-xl flex items-center justify-center text-3xl font-black text-pink-500 shadow-inner";
                    container.classList.remove('active-pulse');
                }
            }

            // Sync instruction text
            const stageInfo = STAGES[currentStage];
            if (stageInfo) {
                document.getElementById('kid-prompt-text').innerText = stageInfo.prompt;
            }
        }

        // Handle input arrows and trigger sequential animation loop
        function handleArrowSelection(direction) {
            if (isAnimating) return;

            const stageInfo = STAGES[currentStage];
            if (!stageInfo) return;

            if (direction === stageInfo.correctDirection) {
                isAnimating = true;

                // 1. Show arrow choice within the empty slot inside C-block
                const slot = document.getElementById(`slot-${currentStage}`);
                let symbol = '➡️';
                if (direction === 'up') symbol = '⬆️';
                if (direction === 'left') symbol = '⬅️';

                slot.innerText = symbol;
                slot.className = "w-full h-full bg-pink-200 border-4 border-solid border-pink-600 rounded-xl flex items-center justify-center text-3xl font-black text-pink-700 shadow-md animate-bounce";
                
                playSound('success');

                // Adjust facing direction based on movement direction
                if (direction === 'right') {
                    rabbitFacingRight = true;
                } else if (direction === 'left') {
                    rabbitFacingRight = false;
                }

                // 2. Animate sequential steps loop-style
                let currentStep = 0;
                const totalSteps = stageInfo.steps;
                const pathArray = stageInfo.path;

                const movingLoop = setInterval(() => {
                    currentStep++;
                    rabbitPos = pathArray[currentStep];
                    
                    playSound('jump');
                    renderGrid();

                    if (currentStep >= totalSteps) {
                        clearInterval(movingLoop);
                        
                        // Proceed progressively
                        setTimeout(() => {
                            if (currentStage === 1) {
                                // Show cute dialog bubble "هيا نكمل طريقنا!" with a laughing face 😄
                                showSuccessBubble = true;
                                renderGrid();
                                playSound('giggle');
                                
                                setTimeout(() => {
                                    showSuccessBubble = false;
                                    currentStage = 2;
                                    isAnimating = false;
                                    syncBlockProgressUI();
                                    renderGrid();
                                }, 2200);
                            } else if (currentStage === 2) {
                                // Show cute dialog bubble "هيا نكمل طريقنا!" with a laughing face 😄
                                showSuccessBubble = true;
                                renderGrid();
                                playSound('giggle');
                                
                                setTimeout(() => {
                                    showSuccessBubble = false;
                                    currentStage = 3;
                                    isAnimating = false;
                                    syncBlockProgressUI();
                                    renderGrid();
                                }, 2200);
                            } else {
                                // Final Carrot milestone achieved!
                                showVictoryModal();
                            }
                        }, 500);
                    }
                }, 450); // Delay between consecutive loop iterations

            } else {
                playSound('fail');
                showTryAgainModal();
            }
        }

        function showTryAgainModal() {
            document.getElementById('try-again-modal').classList.remove('hidden');
        }

        function closeTryAgain() {
            document.getElementById('try-again-modal').classList.add('hidden');
        }

        function showVictoryModal() {
            document.getElementById('victory-modal').classList.remove('hidden');
            triggerConfetti();
        }

        function resetGame() {
            closeTryAgain();
            document.getElementById('victory-modal').classList.add('hidden');

            // Reset loop configs
            currentStage = 1;
            rabbitPos = { r: 5, c: 1 };
            rabbitFacingRight = true; // reset looking RIGHT at start
            isAnimating = false;
            showSuccessBubble = false;

            // Clear Slot inner content
            document.getElementById('slot-1').innerText = '؟';
            document.getElementById('slot-1').className = "w-full h-full bg-pink-50 border-4 border-dashed border-pink-400 rounded-xl flex items-center justify-center text-3xl font-black text-pink-500 shadow-inner pulse-question";

            document.getElementById('slot-2').innerText = '؟';
            document.getElementById('slot-3').innerText = '؟';

            renderGrid();
            syncBlockProgressUI();
        }

        // Responsive confetti splash for victory modal
        let animationId = null;
        function triggerConfetti() {
            const canvas = document.getElementById('victory-confetti');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;

            const particles = [];
            const hues = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];

            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 5 + 4,
                    density: Math.random() * canvas.height,
                    color: hues[Math.floor(Math.random() * hues.length)],
                    sway: Math.random() * 8 - 4,
                    swaySpeed: Math.random() * 0.05 + 0.02,
                    angle: 0
                });
            }

            function frame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, idx) => {
                    p.angle += p.swaySpeed;
                    p.y += (Math.cos(p.density) + 3 + p.size / 2) * 0.45;
                    p.x += Math.sin(p.angle);
                    p.sway = Math.sin(p.angle - idx / 3) * 12;

                    if (p.y > canvas.height) {
                        p.x = Math.random() * canvas.width;
                        p.y = -15;
                    }

                    ctx.beginPath();
                    ctx.fillStyle = p.color;
                    ctx.arc(p.x + p.sway, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });

                animationId = requestAnimationFrame(frame);
            }

            if (animationId) cancelAnimationFrame(animationId);
            frame();
        }

        // Initialize state on window load
        window.onload = function() {
            renderGrid();
            syncBlockProgressUI();
        };
    </script>
</body>
</html>
