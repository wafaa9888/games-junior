<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🛒 لعبة سوق الأرقام المرحة</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
    
    :root{
      --sky: #87CEEB;
      --grass: #90EE90;
      --sun: #FFD700;
      --pink: #FF69B4;
      --purple: #9370DB;
      --orange: #FFA500;
      --red: #FF6B6B;
      --blue: #4ECDC4;
      --green: #95E1D3;
    }
    
    *{box-sizing:border-box; margin:0; padding:0}
    
    body{
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(180deg, var(--sky) 0%, var(--grass) 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 20px;
      overflow-x: hidden;
    }
    
    /* Animated clouds */
    .clouds{
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    
    .cloud{
      position: absolute;
      animation: float 30s infinite linear;
      opacity: 0.7;
    }
    
    @keyframes float{
      from{transform: translateX(-200px)}
      to{transform: translateX(calc(100vw + 200px))}
    }
    
    .app{
      position: relative;
      z-index: 1;
      width: min(900px, 100%);
      background: white;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      animation: slideIn 0.5s ease-out;
    }
    
    @keyframes slideIn{
      from{transform: translateY(50px); opacity: 0}
      to{transform: translateY(0); opacity: 1}
    }
    
    .header{
      background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .header h1{
      color: white;
      font-size: 32px;
      font-weight: 900;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
      margin-bottom: 10px;
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce{
      0%, 100%{transform: translateY(0)}
      50%{transform: translateY(-10px)}
    }
    
    .stars{
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 24px;
      animation: twinkle 1.5s infinite alternate;
    }
    
    @keyframes twinkle{
      from{opacity: 0.5; transform: scale(1)}
      to{opacity: 1; transform: scale(1.2)}
    }
    
    .score-board{
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .score-item{
      background: linear-gradient(135deg, var(--orange) 0%, var(--sun) 100%);
      color: white;
      padding: 12px 20px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      animation: pop 0.3s ease-out;
    }
    
    @keyframes pop{
      0%{transform: scale(0.8)}
      50%{transform: scale(1.1)}
      100%{transform: scale(1)}
    }
    
    .content{
      padding: 30px 20px;
      min-height: 400px;
    }
    
    .store-grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    
    .item-card{
      background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
      border: 3px solid var(--purple);
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .item-card:hover{
      transform: translateY(-10px) rotate(2deg);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    
    .item-card svg{
      width: 80px;
      height: 80px;
      margin-bottom: 10px;
      filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
    }
    
    .item-name{
      font-size: 18px;
      font-weight: 900;
      color: var(--purple);
      margin: 8px 0;
    }
    
    .item-price{
      background: var(--sun);
      color: #333;
      padding: 6px 12px;
      border-radius: 15px;
      font-weight: 900;
      font-size: 16px;
      display: inline-block;
    }
    
    .question-box{
      background: linear-gradient(135deg, var(--blue) 0%, var(--green) 100%);
      border-radius: 25px;
      padding: 25px;
      margin: 20px 0;
      color: white;
      font-size: 22px;
      font-weight: 900;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      animation: slideIn 0.5s ease-out;
    }
    
    .choices{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    
    .choice-btn{
      background: white;
      border: 4px solid var(--purple);
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: right;
      font-family: 'Tajawal', sans-serif;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .choice-btn:hover:not(:disabled){
      transform: scale(1.05);
      border-color: var(--orange);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    
    .choice-btn:disabled{
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .choice-btn.correct{
      background: linear-gradient(135deg, #90EE90 0%, #32CD32 100%);
      border-color: #228B22;
      animation: correct 0.6s ease-out;
    }
    
    .choice-btn.wrong{
      background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 100%);
      border-color: #FF1493;
      animation: shake 0.5s ease-out;
    }
    
    @keyframes correct{
      0%, 100%{transform: scale(1)}
      25%{transform: scale(1.1) rotate(5deg)}
      75%{transform: scale(1.1) rotate(-5deg)}
    }
    
    @keyframes shake{
      0%, 100%{transform: translateX(0)}
      25%{transform: translateX(-10px)}
      75%{transform: translateX(10px)}
    }
    
    .choice-label{
      display: inline-block;
      background: var(--purple);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      text-align: center;
      line-height: 40px;
      font-size: 24px;
      font-weight: 900;
      margin-left: 10px;
    }
    
    .basket-items{
      margin: 10px 0;
      color: #333;
    }
    
    .feedback{
      display: none;
      padding: 20px;
      border-radius: 20px;
      margin: 20px 0;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      animation: pop 0.5s ease-out;
    }
    
    .feedback.show{
      display: block;
    }
    
    .feedback.success{
      background: linear-gradient(135deg, #90EE90 0%, #32CD32 100%);
      color: white;
    }
    
    .feedback.error{
      background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 100%);
      color: white;
    }
    
    .big-btn{
      background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
      color: white;
      border: none;
      padding: 18px 40px;
      border-radius: 25px;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      margin: 10px;
    }
    
    .big-btn:hover{
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }
    
    .big-btn:active{
      transform: translateY(-2px);
    }
    
    .btn-row{
      text-align: center;
      margin: 20px 0;
    }
    
    .result-box{
      background: linear-gradient(135deg, var(--sun) 0%, var(--orange) 100%);
      border-radius: 25px;
      padding: 30px;
      text-align: center;
      color: white;
      margin: 20px 0;
    }
    
    .result-box h2{
      font-size: 36px;
      margin-bottom: 15px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .mascot{
      font-size: 100px;
      animation: bounce 2s infinite;
    }
  </style>
</head>
<body>
  <div class="clouds" id="clouds"></div>
  
  <div class="app">
    <div class="header">
      <div class="stars">⭐✨⭐</div>
      <h1>🛒 لعبة سوق الأرقام المرحة 🎮</h1>
      <p style="color: white; font-size: 18px;">اجمع واحسب وافرح! 🎉</p>
    </div>
    
    <div class="score-board">
      <div class="score-item">💰 الميزانية: <span id="budget">100</span></div>
      <div class="score-item">⭐ النقاط: <span id="score">0</span></div>
      <div class="score-item">❓ السؤال: <span id="qNum">0</span>/<span id="qTotal">5</span></div>
    </div>
    
    <div class="content" id="content"></div>
  </div>

<script>
const ITEMS = [
  { name: "تفاحة", price: 15, emoji: "🍎", color: "#FF6B6B" },
  { name: "قلم", price: 20, emoji: "✏️", color: "#4ECDC4" },
  { name: "كتاب", price: 35, emoji: "📚", color: "#9370DB" },
  { name: "عصير", price: 10, emoji: "🧃", color: "#FFA500" },
  { name: "دفتر", price: 25, emoji: "📓", color: "#FF69B4" },
  { name: "كرة", price: 30, emoji: "⚽", color: "#95E1D3" }
];

const QUESTIONS = [
  {
    prompt: "اختر السلة التي مجموعها = 100 💯",
    options: [
      { label: "أ", basket: ["كتاب", "دفتر", "قلم", "عصير"] },
      { label: "ب", basket: ["كرة", "دفتر", "قلم", "تفاحة"] },
      { label: "ج", basket: ["كتاب", "دفتر", "قلم", "تفاحة"] },
      { label: "د", basket: ["كرة", "كتاب", "دفتر", "عصير"] }
    ],
    correctIndex: 3,
    explanation: "السلة (د) مجموعها 100 بالضبط! 🎯"
  },
  {
    prompt: "اشتري بـ 85 من أصل 100 (يبقى 15) 💵",
    options: [
      { label: "أ", basket: ["كتاب", "دفتر", "عصير", "تفاحة"] },
      { label: "ب", basket: ["كرة", "دفتر", "قلم"] },
      { label: "ج", basket: ["كتاب", "قلم", "تفاحة"] },
      { label: "د", basket: ["كرة", "كتاب", "عصير"] }
    ],
    correctIndex: 0,
    explanation: "السلة (أ) تكلف 85، والباقي 15! 💰"
  },
  {
    prompt: "اشترِ 3 أشياء فقط ومجموعها = 80 ✨",
    options: [
      { label: "أ", basket: ["كتاب", "دفتر", "قلم"] },
      { label: "ب", basket: ["كرة", "دفتر", "تفاحة"] },
      { label: "ج", basket: ["كتاب", "كرة", "عصير"] },
      { label: "د", basket: ["كرة", "دفتر", "قلم"] }
    ],
    correctIndex: 0,
    explanation: "السلة (أ) فيها 3 أشياء ومجموعها 80! 🎊"
  },
  {
    prompt: "سلة مجموعها 90 وعليها خصم 10 = تدفع 80 🏷️",
    options: [
      { label: "أ", basket: ["كتاب", "دفتر", "قلم", "تفاحة"] },
      { label: "ب", basket: ["كرة", "دفتر", "قلم", "عصير"] },
      { label: "ج", basket: ["كتاب", "كرة", "دفتر"] },
      { label: "د", basket: ["كتاب", "قلم", "عصير"] }
    ],
    correctIndex: 2,
    explanation: "السلة (ج) مجموعها 90، بعد الخصم تدفع 80! 🎁"
  },
  {
    prompt: "اشترِ 4 أشياء ومجموعها = 95 🎪",
    options: [
      { label: "أ", basket: ["كتاب", "دفتر", "قلم", "تفاحة"] },
      { label: "ب", basket: ["كرة", "دفتر", "عصير", "تفاحة"] },
      { label: "ج", basket: ["كتاب", "كرة", "قلم", "تفاحة"] },
      { label: "د", basket: ["كرة", "دفتر", "قلم", "تفاحة"] }
    ],
    correctIndex: 0,
    explanation: "السلة (أ) فيها 4 أشياء ومجموعها 95! 🌟"
  }
];

let state = {
  started: false,
  index: 0,
  score: 0,
  answered: false
};

function createClouds(){
  const clouds = document.getElementById('clouds');
  for(let i = 0; i < 5; i++){
    const cloud = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    cloud.setAttribute("class", "cloud");
    cloud.setAttribute("width", "100");
    cloud.setAttribute("height", "50");
    cloud.setAttribute("viewBox", "0 0 100 50");
    cloud.style.top = `${Math.random() * 40}%`;
    cloud.style.animationDelay = `${i * 6}s`;
    cloud.innerHTML = `
      <ellipse cx="25" cy="35" rx="20" ry="15" fill="white" opacity="0.8"/>
      <ellipse cx="45" cy="30" rx="25" ry="18" fill="white" opacity="0.8"/>
      <ellipse cx="65" cy="35" rx="20" ry="15" fill="white" opacity="0.8"/>
    `;
    clouds.appendChild(cloud);
  }
}

function getSVG(item){
  const colors = {
    "تفاحة": "#FF6B6B",
    "قلم": "#4ECDC4",
    "كتاب": "#9370DB",
    "عصير": "#FFA500",
    "دفتر": "#FF69B4",
    "كرة": "#95E1D3"
  };
  
  const svgs = {
    "تفاحة": `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="35" fill="${colors[item]}"/><path d="M50 20 Q45 25 50 30" stroke="#8B4513" stroke-width="3" fill="none"/><ellipse cx="55" cy="35" rx="8" ry="12" fill="#90EE90" transform="rotate(-30 55 35)"/></svg>`,
    "قلم": `<svg viewBox="0 0 100 100"><rect x="35" y="15" width="30" height="70" rx="5" fill="${colors[item]}"/><polygon points="50,85 40,95 60,95" fill="#FFD700"/><rect x="40" y="25" width="20" height="3" fill="white" opacity="0.5"/></svg>`,
    "كتاب": `<svg viewBox="0 0 100 100"><rect x="25" y="20" width="50" height="60" rx="3" fill="${colors[item]}"/><rect x="30" y="25" width="40" height="50" rx="2" fill="white"/><line x1="35" y1="35" x2="65" y2="35" stroke="${colors[item]}" stroke-width="2"/><line x1="35" y1="45" x2="65" y2="45" stroke="${colors[item]}" stroke-width="2"/><line x1="35" y1="55" x2="60" y2="55" stroke="${colors[item]}" stroke-width="2"/></svg>`,
    "عصير": `<svg viewBox="0 0 100 100"><rect x="35" y="30" width="30" height="50" rx="3" fill="${colors[item]}"/><rect x="37" y="35" width="26" height="30" fill="#FFD700" opacity="0.7"/><rect x="40" y="20" width="20" height="12" rx="2" fill="#FF6B6B"/><ellipse cx="50" cy="25" rx="8" ry="3" fill="#C0C0C0"/></svg>`,
    "دفتر": `<svg viewBox="0 0 100 100"><rect x="30" y="20" width="40" height="60" rx="2" fill="${colors[item]}"/><rect x="33" y="23" width="34" height="54" fill="white"/><circle cx="35" cy="30" r="2" fill="${colors[item]}"/><circle cx="35" cy="40" r="2" fill="${colors[item]}"/><circle cx="35" cy="50" r="2" fill="${colors[item]}"/><line x1="42" y1="35" x2="65" y2="35" stroke="#DDD" stroke-width="1.5"/><line x1="42" y1="45" x2="65" y2="45" stroke="#DDD" stroke-width="1.5"/></svg>`,
    "كرة": `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="${colors[item]}"/><path d="M50 15 L50 50 L25 35 Z" fill="white" opacity="0.3"/><path d="M50 50 L75 35 L50 85 Z" fill="black" opacity="0.2"/><circle cx="50" cy="50" r="35" fill="none" stroke="white" stroke-width="2" opacity="0.5"/></svg>`
  };
  
  return svgs[item] || `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="${colors[item] || '#CCC'}"/></svg>`;
}

function sumBasket(basket){
  return basket.reduce((sum, name) => {
    const item = ITEMS.find(i => i.name === name);
    return sum + (item ? item.price : 0);
  }, 0);
}

function updateUI(){
  document.getElementById('budget').textContent = '100';
  document.getElementById('score').textContent = state.score;
  document.getElementById('qNum').textContent = state.started ? state.index + 1 : 0;
  document.getElementById('qTotal').textContent = QUESTIONS.length;
}

function showStart(){
  const content = document.getElementById('content');
  content.innerHTML = `
    <div style="text-align: center; padding: 20px;">
      <div class="mascot">🐻🎈</div>
      <h2 style="font-size: 28px; color: #9370DB; margin: 20px 0;">مرحباً بك في السوق! 🏪</h2>
      <p style="font-size: 20px; color: #666; margin: 20px 0;">
        عندك 100 💰<br>
        اختر السلة الصحيحة في كل سؤال<br>
        واجمع أكبر عدد من النقاط! ⭐
      </p>
      
      <div style="background: linear-gradient(135deg, #E8F5E9 0%, #FFF9C4 100%); border-radius: 20px; padding: 20px; margin: 20px 0;">
        <h3 style="color: #9370DB; font-size: 22px; margin-bottom: 15px;">📋 قائمة الأسعار</h3>
        <div class="store-grid">
          ${ITEMS.map(item => `
            <div class="item-card">
              ${getSVG(item.name)}
              <div class="item-name">${item.name}</div>
              <div class="item-price">${item.price} 💰</div>
            </div>
          `).join('')}
        </div>
      </div>
      
      <div class="btn-row">
        <button class="big-btn" onclick="startGame()">🎮 ابدأ اللعب</button>
      </div>
    </div>
  `;
}

function startGame(){
  state = { started: true, index: 0, score: 0, answered: false };
  updateUI();
  showQuestion();
}

function showQuestion(){
  state.answered = false;
  const q = QUESTIONS[state.index];
  const content = document.getElementById('content');
  
  content.innerHTML = `
    <div class="question-box">
      <div style="font-size: 28px; margin-bottom: 10px;">❓ سؤال ${state.index + 1}</div>
      ${q.prompt}
    </div>
    
    <div class="choices">
      ${q.options.map((opt, i) => {
        const sum = sumBasket(opt.basket);
        return `
          <button class="choice-btn" onclick="checkAnswer(${i})">
            <div style="display: flex; align-items: center; justify-content: flex-end; margin-bottom: 10px;">
              <span style="font-size: 22px;">${opt.label}</span>
              <span class="choice-label">${opt.label}</span>
            </div>
            <div class="basket-items">
              ${opt.basket.map(item => {
                const itm = ITEMS.find(x => x.name === item);
                return `<div style="margin: 5px 0;">${itm.emoji} ${item} = ${itm.price}</div>`;
              }).join('')}
            </div>
            <div style="background: #FFD700; color: #333; padding: 8px; border-radius: 10px; margin-top: 10px; font-weight: 900;">
              💰 المجموع: ؟؟؟
            </div>
          </button>
        `;
      }).join('')}
    </div>
    
    <div class="feedback" id="feedback"></div>
    
    <div class="btn-row">
      <button class="big-btn" id="nextBtn" onclick="nextQuestion()" disabled style="opacity: 0.5;">التالي ⬅️</button>
    </div>
  `;
  
  updateUI();
}

function checkAnswer(chosenIndex){
  if(state.answered) return;
  state.answered = true;
  
  const q = QUESTIONS[state.index];
  const correct = (chosenIndex === q.correctIndex);
  
  if(correct) state.score += 10;
  
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if(i === q.correctIndex){
      btn.classList.add('correct');
    }
    if(i === chosenIndex && !correct){
      btn.classList.add('wrong');
    }
  });
  
  const feedback = document.getElementById('feedback');
  feedback.className = `feedback show ${correct ? 'success' : 'error'}`;
  feedback.innerHTML = `
    <div style="font-size: 50px; margin-bottom: 10px;">${correct ? '🎉' : '😅'}</div>
    <div>${correct ? 'أحسنت! إجابة صحيحة!' : 'حاول مرة أخرى!'}</div>
    <div style="margin-top: 10px; font-size: 18px;">${q.explanation}</div>
    <div style="margin-top: 15px; font-size: 20px;">${correct ? '+10 نقاط ⭐' : 'لا توجد نقاط'}</div>
  `;
  
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = false;
  nextBtn.style.opacity = '1';
  
  updateUI();
}

function nextQuestion(){
  state.index++;
  if(state.index >= QUESTIONS.length){
    showResult();
  } else {
    showQuestion();
  }
}

function showResult(){
  const maxScore = QUESTIONS.length * 10;
  const percent = Math.round((state.score / maxScore) * 100);
  
  let mascot = '🏆';
  let message = 'رائع جداً!';
  let color1 = '#FFD700';
  let color2 = '#FFA500';
  
  if(percent === 100){
    mascot = '👑🏆⭐';
    message = 'مذهل! أنت بطل الأرقام!';
    color1 = '#FFD700';
    color2 = '#FF69B4';
  } else if(percent >= 60){
    mascot = '🎉🌟';
    message = 'عمل رائع! واصل التدريب!';
    color1 = '#9370DB';
    color2 = '#4ECDC4';
  } else {
    mascot = '💪😊';
    message = 'جيد! جرّب مرة أخرى!';
    color1 = '#FF69B4';
    color2 = '#FFA500';
  }
  
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="result-box" style="background: linear-gradient(135deg, ${color1} 0%, ${color2} 100%);">
      <div class="mascot">${mascot}</div>
      <h2>${message}</h2>
      <div style="font-size: 48px; margin: 20px 0; font-weight: 900;">${state.score} / ${maxScore}</div>
      <div style="font-size: 24px; margin: 15px 0;">نسبة النجاح: ${percent}%</div>
    </div>
    
    <div style="text-align: center; padding: 20px;">
      <p style="font-size: 20px; color: #666; margin: 20px 0;">
        ${percent === 100 ? 'أنت عبقري الأرقام! 🧠✨' : 
          percent >= 60 ? 'أداء ممتاز! استمر في التدريب! 💪' : 
          'لا تستسلم! المحاولة القادمة ستكون أفضل! 🌈'}
      </p>
    </div>
    
    <div class="btn-row">
      <button class="big-btn" onclick="startGame()">🔄 العب مرة أخرى</button>
      <button class="big-btn" onclick="showStart()" style="background: linear-gradient(135deg, #4ECDC4 0%, #95E1D3 100%);">🏠 العودة للبداية</button>
    </div>
  `;
  
  updateUI();
}

createClouds();
showStart();
updateUI();
</script>
</body>
</html>
